# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

# Theme Settings
# Using remote_theme ensures you get the latest version from GitHub
remote_theme           : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise", "catppuccin_latte", "catppuccin_mocha"

# Site Settings
locale                   : "en-US"
direction                : # "ltr" (default), "rtl"
title                    : "StopStore"
title_separator          : "-"
subtitle                 : # site tagline
name                     : "Himanshu"
description              : "The best deals and news."
url                      : "https://him001133.github.io"
baseurl                  : "/stopstore"
additional_css           : ["assets/css/custom.css"]

# Standard settings - these remain as they were for stability
repository               : "him001133/stopstore"
teaser                   : 
logo                     : 
masthead_title           : 
breadcrumbs              : false
words_per_minute         : 200
enable_copy_code_button  : false
copyright                : 
copyright_url            : 

# Comments
comments:
  provider               : false

# Search
search                   : true
search_provider          : "lunr"

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "Himanshu"
  avatar           : 
  bio              : "I am an **amazing** person."
  location         : "Somewhere"
  email            :
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/him001133"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/him001133"
  since: "2026"

# Conversion & Processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations: ['import']

# Outputting
permalink: /:categories/:title/

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      
